  <title>24节气</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #FFFFFF;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 40px 20px 30px;
    }

    .app-title {
      font-size: 18px;
      font-weight: 500;
      color: #C41E3A;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .current-term {
      font-size: clamp(48px, 15vw, 80px);
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
      margin-bottom: 15px;
    }

    .term-date-range {
      font-size: 16px;
      color: #888;
      margin-bottom: 30px;
    }

    .info-section {
      background: #f8f8f8;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #e8e8e8;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 14px;
      color: #666;
    }

    .info-value {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .countdown-section {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      color: white;
      margin-bottom: 20px;
    }

    .countdown-label {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .countdown-number {
      font-size: clamp(36px, 10vw, 56px);
      font-weight: 700;
      margin-bottom: 5px;
    }

    .countdown-unit {
      font-size: 16px;
      opacity: 0.9;
    }

    .progress-section {
      background: #f8f8f8;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-label {
      font-size: 14px;
      color: #666;
    }

    .progress-days {
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e8e8e8;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .knowledge-section {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .knowledge-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
    }

    .knowledge-title::before {
      content: "📖";
      margin-right: 8px;
      font-size: 18px;
    }

    .knowledge-content {
      font-size: 14px;
      line-height: 1.8;
      color: #444;
    }

    .poem-section {
      margin-top: auto;
      padding: 30px 20px;
      text-align: center;
      border-top: 1px solid #e8e8e8;
    }

    .poem-content {
      font-family: "Georgia", "Times New Roman", "Songti SC", "SimSun", serif;
      font-size: 18px;
      line-height: 1.8;
      color: #444;
      font-style: italic;
      margin-bottom: 10px;
    }

    .poem-source {
      font-size: 14px;
      color: #999;
      font-style: normal;
    }

    .install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 14px 28px;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      display: none;
      z-index: 1000;
      border: 2px solid white;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }
      50% {
        transform: translateX(-50%) scale(1.05);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
      }
    }

    .install-prompt.show {
      display: block;
    }

    .install-instructions {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    .install-instructions.show {
      display: flex;
    }

    .instructions-box {
      background: white;
      border-radius: 16px;
      padding: 30px;
      max-width: 400px;
      text-align: center;
    }

    .instructions-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a1a;
    }

    .instructions-steps {
      text-align: left;
      margin-bottom: 20px;
      line-height: 1.8;
      color: #444;
    }

    .instructions-steps ol {
      padding-left: 20px;
    }

    .instructions-steps li {
      margin-bottom: 12px;
    }

    .close-instructions {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .container {
        padding: 15px;
      }

      header {
        padding: 30px 15px 20px;
      }

      .current-term {
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <section class="poem-section">

          <li>选择 <strong>"添加到主屏幕"</strong> 或 <strong>"安装应用"</strong></li>
          <li>点击 <strong>"添加"</strong> 或 <strong>"安装"</strong></li>
        </ol>
      </div>
      <button class="close-instructions" id="closeInstructions">知道了</button>
    </div>
  </div>

    // 计算当前日期所在的节气
    function getCurrentTerm() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      for (let i = 0; i < solarTerms.length; i++) {
        const termDate = new Date(solarTerms[i].date);
        termDate.setHours(0, 0, 0, 0);

        const nextTermIndex = (i + 1) % solarTerms.length;
        const nextTermDate = new Date(solarTerms[nextTermIndex].date);
        nextTermDate.setHours(0, 0, 0, 0);

        if (today >= termDate && today < nextTermDate) {
          return {
            current: solarTerms[i],
            next: solarTerms[nextTermIndex],
            prev: solarTerms[(i - 1 + solarTerms.length) % solarTerms.length],
            currentIndex: i
          };
        }
      }

      return null;
    }

    // 格式化日期显示
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${month}月${day}日`;
    }

    // 计算天数差
    function daysBetween(date1, date2) {
      const oneDay = 24 * 60 * 60 * 1000;
      return Math.round((date2 - date1) / oneDay);
    }

    // 更新页面内容
    function updateDisplay() {
      const termInfo = getCurrentTerm();

      if (!termInfo) {
        document.getElementById('currentTerm').textContent = '数据加载中';
        return;
      }

      const { current, next, prev } = termInfo;

      // 更新当前节气
      document.getElementById('currentTerm').textContent = current.name;

      // 计算节气日期范围
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const startDate = new Date(current.date);
      const endDate = new Date(next.date);
      endDate.setDate(endDate.getDate() - 1);

      document.getElementById('termDateRange').textContent =
        `${formatDate(current.date)} - ${formatDate(endDate)}`;

      // 更新信息区域
      document.getElementById('prevTerm').textContent = prev.name;
      document.getElementById('currentTermInfo').textContent = current.name;
      document.getElementById('nextTerm').textContent = next.name;

      // 计算倒计时
      const daysLeft = daysBetween(today, new Date(next.date));
      document.getElementById('countdown').textContent = daysLeft;

      // 计算进度条
      const daysPassed = daysBetween(new Date(current.date), today) + 1; // +1包含当天
      const totalDays = daysBetween(new Date(current.date), new Date(next.date));
      const progressPercent = Math.min(100, Math.max(0, (daysPassed / totalDays) * 100));

      document.getElementById('progressDays').textContent =
        `已过 ${daysPassed} 天 / 共 ${totalDays} 天`;
      document.getElementById('progressFill').style.width = `${progressPercent}%`;

      // 更新节气知识
      if (current.knowledge) {
        document.getElementById('knowledgeContent').textContent = current.knowledge;
      } else {
        document.getElementById('knowledgeContent').textContent = '暂无相关知识';
      }

      // 更新诗词
      document.getElementById('poemContent').textContent = current.poem;
      document.getElementById('poemSource').textContent = current.source;
    }

    // 添加到桌面提示
    let deferredPrompt;
    const installPrompt = document.getElementById('installPrompt');
    const installInstructions = document.getElementById('installInstructions');
    const closeInstructions = document.getElementById('closeInstructions');
    const instructionsSteps = document.getElementById('instructionsSteps');

    // 检测是否是移动设备
    function isMobile() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    // 检测浏览器类型并显示相应的安装说明
    function showInstallInstructions() {
      let steps = '';

      if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
        // iOS Safari
        steps = `
          <ol>
            <li>点击底部的 <strong>分享按钮</strong> <svg style="display:inline-block;vertical-align:middle;width:20px;height:20px;" viewBox="0 0 24 24"><path fill="#007AFF" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg></li>
            <li>向下滚动，找到 <strong>"添加到主屏幕"</strong></li>
            <li>点击 <strong>"添加"</strong></li>
          </ol>
        `;
      } else if (/Android/.test(navigator.userAgent)) {
        // Android Chrome
        steps = `
          <ol>
            <li>点击浏览器右上角的 <strong>菜单按钮</strong> ⋮</li>
            <li>选择 <strong>"安装应用"</strong> 或 <strong>"添加到主屏幕"</strong></li>
            <li>点击 <strong>"安装"</strong> 或 <strong>"添加"</strong></li>
          </ol>
        `;
      } else {
        // 桌面浏览器
        steps = `
          <ol>
            <li>点击地址栏右侧的 <strong>安装图标</strong> ⊕</li>
            <li>或按 <strong>Ctrl+Shift+S</strong> (Windows) / <strong>Cmd+Shift+S</strong> (Mac)</li>
            <li>点击 <strong>"安装"</strong></li>
          </ol>
        `;
      }

      instructionsSteps.innerHTML = steps;
      installInstructions.classList.add('show');
    }

    // 始终在移动设备上显示安装按钮
    if (isMobile()) {
      installPrompt.classList.add('show');
    }

    // 监听 beforeinstallprompt 事件
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installPrompt.classList.add('show');
    });

    // 点击安装按钮
    installPrompt.addEventListener('click', async () => {
      if (deferredPrompt) {
        // 如果有原生安装提示，使用原生方式
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (outcome === 'accepted') {
          installPrompt.classList.remove('show');
        }
      } else {
        // 否则显示手动安装说明
        showInstallInstructions();
      }
    });

    // 关闭安装说明
    closeInstructions.addEventListener('click', () => {
      installInstructions.classList.remove('show');
    });

    // 点击背景关闭说明
    installInstructions.addEventListener('click', (e) => {
      if (e.target === installInstructions) {
        installInstructions.classList.remove('show');
      }
    });

    // 初始化
    updateDisplay();

    // 每分钟更新一次倒计时
    setInterval(updateDisplay, 60000);

    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(() => {
        console.log('Service Worker 注册成功');
      }).catch((err) => {
        console.log('Service Worker 注册失败:', err);
      });
    }
  </script>
</body>
</html>
